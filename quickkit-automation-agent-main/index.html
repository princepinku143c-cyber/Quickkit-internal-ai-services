
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050505" />
    
    <!-- 🚨 CSP REMOVED FOR DEBUGGING -->
    <!-- Monitoring: Lightweight Error Trap -->
    <script>
      window.onerror = function (msg, url, line, col, error) {
        // In production, send this to Sentry/LogRocket
        console.error("[Monitor] Captured error:", { msg, url, line, error });
        // Prevent default handler if needed
        return false;
      };
    </script>

    <!-- 1️⃣ SEO Meta Tags -->
    <title>NexusStream – Build AI Automation Workflows Without Code</title>
    <meta name="description" content="NexusStream helps you build, test, and deploy AI-powered automation workflows with a no-code visual builder. Faster, smarter, scalable." />
    <meta name="keywords" content="AI automation, no code workflow, AI workflow builder, automation SaaS, AI tools, drag and drop automation" />
    <meta name="author" content="NexusStream" />

    <!-- 2️⃣ Open Graph (Social Share SEO) -->
    <meta property="og:title" content="NexusStream – AI Automation Made Simple" />
    <meta property="og:description" content="Design, simulate and deploy AI automation workflows without writing code." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nexusstream.site/" />
    <meta property="og:image" content="https://www.nexusstream.site/og-image.png" />
    <meta property="og:site_name" content="NexusStream" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA / Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link
      rel="apple-touch-icon"
      href="https://cdn-icons-png.flaticon.com/512/9626/9626629.png"
    />

    <!-- Payments: Razorpay (Global Object) -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <!-- Tailwind + Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 5️⃣ Font Optimization (Preconnect) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="/manifest.json" />

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Space Grotesk", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              nexus: {
                950: "#050505",
                900: "#0a0a0a",
                800: "#171717",
                700: "#262626",
                600: "#404040",
                500: "#525252",
                accent: "#00ff9d",
                wire: "#ffd700",
                success: "#00ff9d",
                warning: "#ffb800",
                danger: "#ff3333",
                port: "#3b82f6",
              },
            },
            animation: {
              'progress-indefinite': 'progress-indefinite 1.5s infinite linear',
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'scan': 'scan 4s linear infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              'progress-indefinite': {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(300%)' },
              },
              'scan': {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(1000%)' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          },
        },
      };
    </script>

    <link rel="stylesheet" href="/index.css">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
