    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect width=%2240%22 height=%2240%22 rx=%2210%22 fill=%22%233b82f6%22/><circle cx=%2220%22 cy=%2220%22 r=%224%22 fill=%22white%22/><path d=%22M20 12V16M20 24V28M12 20H16M24 20H28%22 stroke=%22white%22 stroke-width=%222%22/></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        #initial-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #030712; }
        .spinner-container { position: relative; width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; }
        .glow-bg { position: absolute; inset: 0; border-radius: 50%; filter: blur(24px); background-color: rgba(59, 130, 246, 0.3); animation: pulse 2s infinite; }
        .spin-1 { position: absolute; width: 100%; height: 100%; animation: spin 3s linear infinite; }
        .spin-2 { position: absolute; width: 64px; height: 64px; animation: spin-reverse 4s ease-in-out infinite; }
        .center-icon { width: 32px; height: 32px; background: linear-gradient(to bottom right, #3b82f6, #10b981); border-radius: 8px; animation: pulse 2s infinite; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; font-weight: 900; font-size: 12px; }
        .loader-text { margin-top: 24px; color: #e2e8f0; font-family: 'Outfit', sans-serif; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 14px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
  <body>
    <div id="root">
        <div id="initial-loader">
            <div class="spinner-container">
                <div class="glow-bg"></div>
                <svg class="spin-1" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#1e293b" stroke-width="2" />
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-dasharray="70 200" />
                </svg>
                <svg class="spin-2" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#1e293b" stroke-width="2" />
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-dasharray="40 200" />
                </svg>
                <div class="center-icon">AI</div>
            </div>
            <div class="loader-text">Waking Up Architecture...</div>
        </div>
    </div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
