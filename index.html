    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              nexus: {
                dark: '#030712',
                card: '#0f172a',
                border: '#1e293b',
                accent: '#3b82f6',
                success: '#10b981',
                error: '#ef4444',
                glass: 'rgba(15, 23, 42, 0.65)',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'pulse-glow': 'pulseGlow 2s infinite ease-in-out',
              'float': 'float 4s infinite ease-in-out',
              'border-glow': 'borderGlow 3s infinite linear',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              pulseGlow: {
                '0%, 100%': { opacity: '0.4', filter: 'blur(8px)' },
                '50%': { opacity: '0.8', filter: 'blur(16px)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              borderGlow: {
                '0%': { 'border-color': '#3b82f6' },
                '33%': { 'border-color': '#8b5cf6' },
                '66%': { 'border-color': '#10b981' },
                '100%': { 'border-color': '#3b82f6' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: #030712;
        color: #f1f5f9;
        -webkit-font-smoothing: antialiased;
      }
      .glass-card {
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .glass-card:hover {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(59, 130, 246, 0.3);
        box-shadow: 0 0 30px rgba(59, 130, 246, 0.1);
        transform: translateY(-4px);
      }
      .glass-panel {
        background: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(12px);
      }
      .cyber-glow {
        position: relative;
        overflow: hidden;
      }
      .cyber-glow::after {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 60%);
        animation: pulseGlow 4s infinite linear;
        pointer-events: none;
      }
      /* Animated Background Grid */
      .bg-grid {
        background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(ellipse 80% 50% at 50% 0%, black, transparent);
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #030712; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 20px; }
      ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
  <body>
    <div id="root">
        <style>
            #initial-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #030712; }
            .spinner-container { position: relative; width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; }
            .glow-bg { position: absolute; inset: 0; border-radius: 50%; filter: blur(24px); background-color: rgba(59, 130, 246, 0.3); animation: pulse 2s infinite; }
            .spin-1 { position: absolute; width: 100%; height: 100%; animation: spin 3s linear infinite; }
            .spin-2 { position: absolute; width: 64px; height: 64px; animation: spin-reverse 4s ease-in-out infinite; }
            .center-icon { width: 32px; height: 32px; background: linear-gradient(to bottom right, #3b82f6, #10b981); border-radius: 8px; animation: pulse 2s infinite; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; font-weight: 900; font-size: 12px; }
            .loader-text { margin-top: 24px; color: #e2e8f0; font-family: 'Outfit', sans-serif; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 14px; }
            @keyframes spin { 100% { transform: rotate(360deg); } }
            @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
            @keyframes pulse { 50% { opacity: 0.5; } }
        </style>
        <div id="initial-loader">
            <div class="spinner-container">
                <div class="glow-bg"></div>
                <svg class="spin-1" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#1e293b" stroke-width="2" />
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-dasharray="70 200" />
                </svg>
                <svg class="spin-2" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#1e293b" stroke-width="2" />
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-dasharray="40 200" />
                </svg>
                <div class="center-icon">AI</div>
            </div>
            <div class="loader-text">Waking Up Architecture...</div>
        </div>
    </div>
    <script type="module" src="./index.tsx"></script>
